<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        /* 极简容器 */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 20px;
        }

        /* 四个黄色按钮 */
        .btn {
            width: 260px;
            padding: 16px 0;
            background-color: #f5d742;
            border: none;
            border-radius: 60px;
            font-size: 22px;
            font-weight: 600;
            color: #3b2e1e;
            text-align: center;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            font-family: inherit;
        }

        /* 简单按压效果 */
        .btn:active {
            transform: scale(0.97);
            background-color: #e6c935;
        }

        /* 去掉所有多余装饰 */
        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 指尖躲避 -->
    <button class="btn" onclick="location.href='https://tyy485.github.io/zjdb/'">指尖躲避</button>
    <!-- 贪吃蛇 -->
    <button class="btn" onclick="location.href='https://tyy485.github.io/tanchishe/'">贪吃蛇</button>
    <!-- 小猫移动 -->
    <button class="btn" onclick="location.href='https://tyy485.github.io/catmove/'">小猫移动</button>
    <!-- 见缝插针 -->
    <button class="btn" onclick="location.href='https://tyy485.github.io/jfcz/'">见缝插针</button>
    <!-- 吃豆子 -->
    <button class="btn" onclick="location.href='https://tyy485.github.io/cdz/'">吃豆子</button>
</div>
</body>
</html>
